<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School of Pharmacy | Al-Karim University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hero-gradient { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1600x600'); background-size: cover; }
        .pharmacy-green { color: #2D5A27; }
        .bg-pharmacy { background-color: #2D5A27; }
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold bg-pharmacy text-white px-4 py-1 rounded">AL-KARIM UNIVERSITY</div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="#about" class="hover:text-green-700">About</a>
                <a href="#courses" class="hover:text-green-700">Courses</a>
                <a href="#facilities" class="hover:text-green-700">Facilities</a>
                <a href="#contact" class="hover:text-green-700">Contact</a>
            </div>
            <button onclick="toggleModal()" class="hidden md:block bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded-full transition">
                Apply Now
            </button>
        </div>
    </nav>

    <header class="hero-gradient h-[500px] flex items-center justify-center text-center text-white">
        <div class="px-4">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">SCHOOL OF PHARMACY</h1>
            <p class="text-xl md:text-2xl mb-8">Approved by Pharmacy Council of India (PCI)</p>
            <button onclick="toggleModal()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 px-8 rounded-full transition">
                Apply Now for Admission
            </button>
        </div>
    </header>

    <footer id="contact" class="bg-gray-900 text-white py-12">
        <div class="text-center mt-12 pt-8 border-t border-gray-800 text-gray-500">
            &copy; 2026 Al-Karim University. All Rights Reserved.
        </div>
    </footer>

    <div id="applyModal" class="modal fixed inset-0 bg-gray-900 bg-opacity-75 items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 relative overflow-y-auto max-h-[90vh]">
            <button onclick="toggleModal()" class="absolute top-4 right-4 text-gray-500 hover:text-red-500 text-2xl">
                <i class="fas fa-times"></i>
            </button>

            <h3 class="text-3xl font-bold pharmacy-green mb-2 text-center">Interested Student Form</h3>
            <p class="text-gray-600 text-center mb-8">Provide your details to initiate your application.</p>

            <form action="https://formspree.io/f/YOUR_UNIQUE_FORM_ID" method="POST" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="name">Full Name</label>
                    <input type="text" name="name" id="name" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-300 focus:border-green-600 outline-none transition"
                           placeholder="Ex: Rajesh Kumar">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="mobile">Mobile Number</label>
                    <input type="tel" name="mobile" id="mobile" required pattern="[0-9]{10}"
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-300 focus:border-green-600 outline-none transition"
                           placeholder="10-digit mobile number">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Select Course</label>
                    <select name="course" required
                            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-300 focus:border-green-600 outline-none transition bg-white">
                        <option value="" disabled selected>Choose Course</option>
                        <option value="B.Pharm">B.Pharm (4 Years)</option>
                        <option value="D.Pharm">D.Pharm (2 Years)</option>
                        <option value="B.Pharm (Lateral)">B.Pharm (Lateral Entry - 3 Years)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1" for="qualification">Current Qualification</label>
                    <input type="text" name="qualification" id="qualification" required
                           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-300 focus:border-green-600 outline-none transition"
                           placeholder="Ex: 12th Science / D.Pharm">
                </div>

                <input type="hidden" name="_subject" value="New Student Admission Enquiry">

                <div>
                    <button type="submit"
                            class="w-full bg-pharmacy text-white font-bold py-3 rounded-xl hover:bg-green-800 transition shadow-md">
                        Submit Application
                    </button>
                </div>
            </form>
            </div>
    </div>

    <script>
        function toggleModal() {
            const modal = document.getElementById('applyModal');
            modal.classList.toggle('active');
            // Form open hone par main page scroll block karne ke liye
            document.body.classList.toggle('overflow-hidden');
        }

        // Modal ke bahar click karne par use band karne ke liye
        window.onclick = function(event) {
            const modal = document.getElementById('applyModal');
            if (event.target == modal) {
                toggleModal();
            }
        }
    </script>

</body>
</html>
